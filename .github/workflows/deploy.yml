name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "📦 Обновление кода на сервере..."
            cd /root
            rm -rf fastapi-actions-demo
            git clone https://github.com/${{ github.repository }}.git fastapi-actions-demo
            cd fastapi-actions-demo

            echo "🐳 Остановка старых контейнеров..."
            docker compose down 2>/dev/null || true

            echo "🐳 Сборка и запуск контейнеров..."
            docker compose up -d --build

            echo "✅ Деплой завершён!"
            echo "🌐 Фронтенд: http://${{ secrets.VPS_HOST }}"
            echo "📡 API: http://${{ secrets.VPS_HOST }}:8000"